worker_processes auto;

events {
  worker_connections 2048;
}

http {
  # Uploads admin (cardbase/cartas em JSON base64) — padrão nginx é 1m e causa HTTP 413
  # Base64 ~+33%; JSON wrapper; margem para proxies — 256m
  client_max_body_size 256m;

  upstream kardum_backend {
    least_conn;
    server app1:3000 max_fails=3 fail_timeout=10s;
    server app2:3000 max_fails=3 fail_timeout=10s;
  }

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  # Sticky routing by client IP for websocket sessions.
  upstream kardum_sticky {
    ip_hash;
    server app1:3000;
    server app2:3000;
  }

  server {
    listen 80;
    server_name _;
    client_max_body_size 256m;

    location /socket.io/ {
      client_max_body_size 256m;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      proxy_pass http://kardum_sticky;
    }

    location / {
      client_max_body_size 256m;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://kardum_backend;
    }
  }
}

